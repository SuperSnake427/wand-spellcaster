name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spellcaster
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (runtime deps + dev tools)
        # gpiozero/picamera2 are Pi-only and intentionally not installed; ty's
        # config ignores their unresolved imports.
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: ty (type-check)
        run: uv run ty check .
